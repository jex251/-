<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube埋め込み変換</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>YouTube 埋め込み変換(リンクを入力で視聴可能！)</h2>

    <div class="input-area">
      <input id="url" type="text" placeholder="YouTubeのURLを入力" />
      <button id="load">読み込む</button>
    </div>

    <div id="player"></div>

    <script src="script.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
